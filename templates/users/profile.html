{% extends 'base.html' %}

{% block title %}Профиль{% endblock %}

{% block content %}
<section class="form-page">
    <h1>Профиль</h1>

    {% if user.avatar %}
        <img class="avatar" src="{{ user.avatar.url }}" alt="Аватар пользователя">
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="content-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить профиль</button>
    </form>
</section>
{% endblock %}
